{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}

{% block content %}

<div class="profile-wrapper">
    <div class="profile-card">

        <h2>Edit Profile</h2>

        <form method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" value="{{ username }}" required placeholder="Enter your username" title="Username">
            </div>
             <div class="form-group">
    <label>Full Name</label>
    <input type="text"
           name="full_name"
           value="{{ full_name }}"
           placeholder="Enter your full name"
           title="Full Name">
</div>

<div class="form-group">
    <label>Phone Number</label>
    <input type="text"
           name="phone"
           value="{{ phone }}"
           placeholder="Enter your phone number"
           title="Phone Number">
</div>

<div class="form-group">
    <label>Designation</label>
    <input type="text"
           name="designation"
           value="{{ designation }}"
           placeholder="Enter your designation"
           title="Designation">
</div>

<div class="form-group">
    <label for="email">Email</label>
    <input type="email"
           id="email"
           name="email"
           value="{{ email }}"
           placeholder="Enter your email"
           readonly>
</div>
            <div class="profile-upload-container">

    <div class="avatar-preview-wrapper">
        <img 
            id="avatarPreview"
            src="{% if profile_pic %}{{ url_for('static', filename='uploads/' + profile_pic) }}{% else %}https://api.dicebear.com/7.x/avataaars/svg?seed={{ email }}{% endif %}"
            alt="Profile avatar preview"
            class="avatar-preview"
        >

        <label for="profile_pic" class="upload-overlay">
            ✏ Change
        </label>

        <input type="file" name="profile_pic" id="profile_pic" hidden>
    </div>

</div>

<script>
document.getElementById("profile_pic").addEventListener("change", function(event) {
    const reader = new FileReader();

    reader.onload = function(){
        document.getElementById("avatarPreview").src = reader.result;
    }

    if(event.target.files[0]){
        reader.readAsDataURL(event.target.files[0]);
    }
});
</script>



            <button type="submit" class="edit-btn">💾 Save Changes</button>

        </form>

    </div>
</div>

<style>
    .profile-upload-container {
    display: flex;
    justify-content: center;
    margin-bottom: 25px;
}

.avatar-preview-wrapper {
    position: relative;
    width: 140px;
    height: 140px;
}

.avatar-preview {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #6c8cff;
    transition: 0.3s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.avatar-preview:hover {
    transform: scale(1.05);
}

.upload-overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    text-align: center;
    background: linear-gradient(135deg, #4f6df5, #7b5dfc);
    color: white;
    padding: 8px 0;
    border-bottom-left-radius: 50%;
    border-bottom-right-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    transition: 0.3s;
}

.upload-overlay:hover {
    opacity: 0.9;
}

    .upload-wrapper {
    margin-top: 15px;
}

.custom-file-upload {
    display: inline-block;
    padding: 10px 18px;
    cursor: pointer;
    background: linear-gradient(135deg, #4f6df5, #7b5dfc);
    color: white;
    border-radius: 10px;
    font-weight: 500;
    transition: 0.3s ease;
}

.custom-file-upload:hover {
    opacity: 0.9;
    transform: scale(1.03);
}

.custom-file-upload input[type="file"] {
    display: none;
}

#file-name {
    display: block;
    margin-top: 8px;
    font-size: 14px;
    color: #444;
}

.profile-wrapper {
    display: flex;
    justify-content: center;
    padding: 60px 0;
}

.profile-card {
    width: 450px;
    background: rgba(255,255,255,0.15);
    -webkit-backdrop-filter: blur(15px);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    color: white;
}

.form-group {
    margin-bottom: 20px;
    text-align: left;
}

.form-group input {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: none;
}

.edit-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 26px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg, #5f8bff, #7b61ff);
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 8px 20px rgba(91, 120, 255, 0.4);
    letter-spacing: 0.5px;
}

.edit-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 25px rgba(91, 120, 255, 0.6);
}

.edit-btn:active {
    transform: scale(0.96);
}

</style>

{% endblock %}
