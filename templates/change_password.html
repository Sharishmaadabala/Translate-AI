{% extends "base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}

<div class="profile-wrapper">
    <div class="profile-card">

        <h2 class="section-title">
            🔐 Change Password
        </h2>

        {% if error %}
            <p class="error-message">
                {{ error }}
            </p>
        {% endif %}

        <form method="POST">

            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" required title="Current Password" placeholder="Enter current password">
            </div>

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required title="New Password" placeholder="Enter new password">
            </div>

            <button type="submit" class="edit-btn">
                🔒 Update Password
            </button>

        </form>

    </div>
</div>

<style>

/* Wrapper */
.profile-wrapper {
    display: flex;
    justify-content: center;
    padding: 60px 0;
}

/* Glass Card */
.profile-card {
    width: 460px;
    background: rgba(255,255,255,0.15);
    -webkit-backdrop-filter: blur(18px);
    backdrop-filter: blur(18px);
    padding: 40px;
    border-radius: 22px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.35);
    color: white;
}

/* Form Group */
.form-group {
    margin-bottom: 20px;
    text-align: left;
}

.form-group label {
    color: white;
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
}

/* Input Styling */
.form-group input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.9);
    color: black;
    font-size: 14px;
}

/* Button */
.edit-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(135deg, #4f6df5, #7b61ff);
    color: white;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    margin-top: 10px;
    transition: 0.3s ease;
}

.edit-btn:hover {
    transform: scale(1.03);
}

</style>

{% endblock %}
